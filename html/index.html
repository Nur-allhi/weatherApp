<!DOCTYPE html>
<html>
<head>
    <title>C_based - Weather_Station</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="search-box">
        <h1>Weather App</h1>
        <p>Built with C & Apache CGI</p>
        
        <form action="/cgi-bin/weather.cgi" method="GET">
            <input type="text" name="city" placeholder="Enter City Name (e.g. Dhaka)" required>
            <button type="submit">Check Weather</button>
        </form>
    </div>
</body>
</html>
